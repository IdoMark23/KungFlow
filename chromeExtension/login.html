<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 300px;
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: #e2e8f0;
    }

    .container {
      padding: 16px;
    }

    .app-logo {
      display: block;
      width: 72px;
      height: 56px;
      margin: 0 auto 10px;
      object-fit: contain;
    }

    h3 {
      margin: 0 0 6px;
      font-size: 18px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 16px;
      color: #afc0d4;
      font-size: 13px;
      text-align: center;
    }

    .card {
      background: #1b2638;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.24);
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: bold;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
      color: #111827;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px;
      margin-top: 4px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.85;
    }

    .hint {
      margin: 12px 0 0;
      color: #94a3b8;
      font-size: 12px;
      text-align: center;
    }

    .secondary {
      background: #243044;
      color: #e2e8f0;
    }

    .message {
      min-height: 16px;
      margin: 10px 0 0;
      font-size: 12px;
      text-align: center;
    }

    .error {
      color: #f87171;
    }

    .success {
      color: #16a34a;
    }
  </style>
</head>

<body>
  <div class="container">
    <img class="app-logo" src="assets/icon128.png" alt="KungFlow logo">
    <h3>KungFlow Login</h3>
    <p class="subtitle">Sign in to sync KungFlow metrics</p>

    <form id="loginForm" class="card">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="user@example.com" autocomplete="email" required>

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="At least 8 characters" autocomplete="current-password" required>

      <button type="submit">Login</button>
      <button id="registerButton" class="secondary" type="button">Register</button>
      <p id="message" class="message"></p>
      <p class="hint">Requires the local KungFlow server on port 3000.</p>
    </form>
  </div>

  <script src="apiClient.js"></script>
  <script src="login.js"></script>
</body>

</html>
