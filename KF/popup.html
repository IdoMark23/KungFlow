<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e0f7ff, #f8fbff);
      color: #1f2937;
    }

    .container {
      padding: 16px;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 18px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      margin-bottom: 14px;
    }

    .count {
      font-size: 42px;
      font-weight: bold;
      color: #2563eb;
      margin: 8px 0;
    }

    .sub-count {
      font-size: 20px;
      font-weight: bold;
      color: #7c3aed;
      margin: 4px 0 8px;
    }

    .label {
      font-size: 13px;
      color: #6b7280;
    }

    .status {
      font-size: 13px;
      margin-top: 8px;
      font-weight: bold;
    }

    .active {
      color: #16a34a;
    }

    .inactive {
      color: #dc2626;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    #toggle {
      background: #2563eb;
      color: white;
    }

    #reset {
      background: #e5e7eb;
      color: #111827;
    }

    #changeBg {
      background: #f3f4f6;
      color: #374151;
    }

    button:hover {
      opacity: 0.85;
    }

    .history-card {
      background: white;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      margin-top: 14px;
    }

    .history-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .history-list {
      max-height: 160px;
      overflow-y: auto;
      padding: 0;
      margin: 0;
      list-style: none;
      font-size: 12px;
    }

    .history-list li {
      padding: 7px;
      border-bottom: 1px solid #e5e7eb;
      color: #374151;
    }

    .empty-history {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      padding: 8px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h3>Tab Switch Counter</h3>

    <div class="card">
      <div class="label">Tab switches</div>
      <div id="count" class="count">0</div>

      <div class="label">Delete key presses</div>
     <div id="delCount" class="count">0</div>

      <div id="status" class="status inactive">Inactive</div>
    </div>

    <button id="toggle">Start Counter</button>
    <button id="reset">Reset</button>
    <button id="changeBg">Change Background</button>

    <div class="history-card">
      <div class="history-title">Switch History</div>
      <ul id="historyList" class="history-list"></ul>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
