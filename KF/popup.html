<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 300px;
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e0f7ff, #f8fbff);
      color: #1f2937;
    }

    .container {
      padding: 16px;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 18px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      margin-bottom: 14px;
    }

    .count {
      font-size: 42px;
      font-weight: bold;
      color: #2563eb;
      margin: 8px 0;
    }

    .sub-count {
      font-size: 20px;
      font-weight: bold;
      color: #7c3aed;
      margin: 4px 0 8px;
    }

    .label {
      font-size: 13px;
      color: #6b7280;
    }

    .section-title {
      margin-top: 14px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #374151;
    }

    .status {
      font-size: 13px;
      margin-top: 12px;
      font-weight: bold;
    }

    .user-row {
      color: #6b7280;
      font-size: 12px;
      margin-bottom: 10px;
      text-align: center;
      word-break: break-word;
    }

    .active {
      color: #16a34a;
    }

    .inactive {
      color: #dc2626;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    #toggle {
      background: #2563eb;
      color: white;
    }

    #reset {
      background: #e5e7eb;
      color: #111827;
    }

    #changeBg {
      background: #f3f4f6;
      color: #374151;
    }

    #toggleReminder {
      background: #eef2ff;
      color: #3730a3;
    }

    #logout {
      background: #fee2e2;
      color: #991b1b;
    }

    button:hover {
      opacity: 0.85;
    }

    hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 14px 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <h3>KungFlow Metrics</h3>
    <div id="userEmail" class="user-row"></div>

    <div class="card">
      <div class="section-title">Total counters</div>

      <div class="label">Total tab switches</div>
      <div id="count" class="count">0</div>

      <div class="label">Total Delete/Backspace</div>
      <div id="delCount" class="count">0</div>

      <hr>

      <div class="section-title">Last collection window</div>

      <div class="label">Open tabs now</div>
      <div id="openTabsCount" class="sub-count">0</div>

      <div class="label">Tab switches in current window</div>
      <div id="tabSwitchCount" class="sub-count">0</div>

      <div class="label">Key presses in current window</div>
      <div id="keyPressCount" class="sub-count">0</div>

      <div class="label">Delete/Backspace in current window</div>
      <div id="deleteKeyCount" class="sub-count">0</div>

      <div class="label">Typing speed</div>
      <div id="typingSpeed" class="sub-count">0</div>

      <div class="label">Cognitive load score</div>
      <div id="cognitiveLoadScore" class="sub-count">Not calculated yet</div>

      <div id="status" class="status inactive">Inactive</div>
    </div>

    <button id="toggle">Start Counter</button>
    <button id="toggleReminder">Disable Cognitive Load Popup</button>
    <button id="reset">Reset</button>
    <button id="changeBg">Change Background</button>
    <button id="logout">Logout</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
